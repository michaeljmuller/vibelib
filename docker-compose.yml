services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vibelib
      POSTGRES_USER: vibelib
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibelib"]
      interval: 5s
      timeout: 5s
      retries: 10

  loader:
    build:
      context: .
      dockerfile: loader/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: vibelib
      POSTGRES_USER: vibelib
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      COVERS_DIR: /covers
      DOWNLOAD_WORKERS: ${DOWNLOAD_WORKERS:-8}
      SKIP_SCHEMA: ${SKIP_SCHEMA:-true}
    volumes:
      - ./data/covers:/covers
    depends_on:
      db:
        condition: service_healthy
